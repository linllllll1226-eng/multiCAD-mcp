name: Security Audit

on:
  push:
    branches: [main, "release/**"]
  pull_request:
  schedule:
    - cron: "41 20 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev --extra docs --extra vision --extra ocr

      - name: Bandit source audit
        run: uv run bandit -r src -ll -ii

      - name: Python dependency vulnerability audit
        shell: pwsh
        run: |
          $auditFile = Join-Path $env:RUNNER_TEMP "audit-requirements.txt"
          uv export --frozen --all-extras --all-groups --no-emit-project `
            --no-hashes --format requirements-txt --output-file $auditFile
          uv run pip-audit --requirement $auditFile --no-deps --strict `
            --progress-spinner off
