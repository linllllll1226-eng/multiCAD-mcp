name: Windows CI

on:
  push:
    branches: [main, "release/**", "feature/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra dev --extra vision --extra docs

      - name: Run tests
        run: uv run pytest -q -p no:cacheprovider

      - name: Run critical Ruff checks
        run: uv run ruff check src tests scripts --select E9,F63,F7,F82

      - name: Run focused vision Ruff checks
        run: >-
          uv run ruff check
          src/cad_vision
          src/mcp_tools/tools/vision.py
          scripts/benchmark_cad_vision.py
          tests/unit/test_cad_vision_analyzer.py
          tests/unit/test_cad_vision_dimensions.py
          tests/unit/test_cad_vision_tool_registration.py

      - name: Build documentation strictly
        run: uv run mkdocs build --strict
