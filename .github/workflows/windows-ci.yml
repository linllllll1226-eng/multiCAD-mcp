name: Windows CI

on:
  push:
    branches: [main, "release/**", "feature/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra dev --extra vision --extra docs

      - name: Run tests
        run: uv run pytest -q -p no:cacheprovider

      - name: Check repository hygiene
        run: uv run python scripts/check_repository_hygiene.py

      - name: Run full Ruff checks
        run: uv run ruff check .

      - name: Check Ruff formatting
        run: uv run ruff format --check .

      - name: Build documentation strictly
        run: uv run mkdocs build --strict
